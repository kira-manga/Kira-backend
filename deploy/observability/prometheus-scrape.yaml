scrape_configs:
  - job_name: kira-backend
    scheme: http
    metrics_path: /actuator/prometheus
    scrape_interval: 30s
    scrape_timeout: 10s
    static_configs:
      - targets: ["kira-backend.kira.svc.cluster.local:9090"]
        labels:
          service: kira-backend
          environment: production
