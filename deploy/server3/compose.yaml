name: kira

services:
  postgres:
    image: postgres:17.6-alpine@sha256:ef257d85f76e48da1c64832459b59fcaba1a4dac97bf5d7450c77753542eee94
    container_name: kira-postgres
    restart: unless-stopped
    env_file:
      - postgres.env
    command:
      - postgres
      - -c
      - ssl=on
      - -c
      - ssl_ca_file=/run/kira-db-tls/ca.crt
      - -c
      - ssl_cert_file=/run/kira-db-tls/server.crt
      - -c
      - ssl_key_file=/run/kira-db-tls/server.key
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres-init.sh:/docker-entrypoint-initdb.d/10-runtime-role.sh:ro
      - ./tls/postgres:/run/kira-db-tls:ro
    networks:
      database:
        aliases: [postgres]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
    security_opt:
      - no-new-privileges:true
    mem_limit: 768m
    cpus: 0.50

  backend-migrate:
    profiles: [tools]
    image: ${KIRA_BACKEND_IMAGE:?KIRA_BACKEND_IMAGE is required}
    env_file:
      - migration.env
    entrypoint:
      - java
      - -Dloader.main=me.manga.kira.backend.database.DatabaseMigrationMain
      - -cp
      - /app/app.jar
      - org.springframework.boot.loader.launch.PropertiesLauncher
    volumes:
      - ./tls/ca.crt:/run/kira-db-ca/ca.crt:ro
    networks: [database]
    depends_on:
      postgres:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    mem_limit: 512m
    cpus: 0.50

  backend:
    image: ${KIRA_BACKEND_IMAGE:?KIRA_BACKEND_IMAGE is required}
    container_name: kira-backend
    restart: unless-stopped
    env_file:
      - backend.env
    ports:
      - "127.0.0.1:18080:8080"
    volumes:
      - ./tls/ca.crt:/run/kira-db-ca/ca.crt:ro
    networks: [database, proxy]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:9090/actuator/health/readiness"]
      interval: 10s
      timeout: 5s
      start_period: 45s
      retries: 12
    read_only: true
    tmpfs:
      - /tmp:size=128m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    mem_limit: 1024m
    cpus: 0.75

  web:
    image: ${KIRA_WEB_IMAGE:?KIRA_WEB_IMAGE is required}
    container_name: kira-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:18081:8080"
    networks: [proxy]
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 6
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    mem_limit: 128m
    cpus: 0.25

networks:
  database:
    name: kira-database
    internal: true
    ipam:
      config:
        - subnet: 172.29.10.0/24
  proxy:
    name: kira-proxy
    ipam:
      config:
        - subnet: 172.29.11.0/24

volumes:
  postgres-data:
    name: kira-postgres-data
