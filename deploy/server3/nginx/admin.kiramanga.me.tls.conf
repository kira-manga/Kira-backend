server {
    listen 80;
    listen [::]:80;
    server_name admin.kiramanga.me;
    location ^~ /.well-known/acme-challenge/ { root /var/www/letsencrypt; }
    location / { return 301 https://admin.kiramanga.me$request_uri; }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name admin.kiramanga.me;
    ssl_certificate /etc/letsencrypt/live/admin.kiramanga.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.kiramanga.me/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    client_max_body_size 5m;

    location / {
        proxy_pass http://127.0.0.1:18082;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }
}
