apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kira-backend
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 256k
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "5"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "40"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "40"
    nginx.ingress.kubernetes.io/limit-rps: "20"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "3"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts: [api.kira.example]
      secretName: kira-api-tls
  rules:
    - host: api.kira.example
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kira-backend
                port:
                  name: http
