apiVersion: batch/v1
kind: Job
metadata:
  name: kira-backend-migrate
  labels:
    app.kubernetes.io/name: kira-backend
    app.kubernetes.io/component: migration
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kira-backend
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: Never
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrate
          # Overlays MUST replace this with the exact release image digest used by the deployment.
          image: ghcr.io/kira-manga/kira-backend@sha256:REPLACE_WITH_RELEASE_DIGEST
          imagePullPolicy: IfNotPresent
          command:
            - java
            - -Dloader.main=me.manga.kira.backend.database.DatabaseMigrationMain
            - -cp
            - /app/app.jar
            - org.springframework.boot.loader.launch.PropertiesLauncher
          env:
            - name: KIRA_MIGRATION_DB_URL
              valueFrom:
                secretKeyRef:
                  name: kira-backend-secrets
                  key: migration-datasource-url
            - name: KIRA_MIGRATION_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: kira-backend-secrets
                  key: migration-datasource-username
            - name: KIRA_MIGRATION_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kira-backend-secrets
                  key: migration-datasource-password
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 100m
              memory: 192Mi
            limits:
              cpu: "1"
              memory: 512Mi
