apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: kira
resources:
  - namespace.yaml
  - service-account.yaml
  - config-map.yaml
  - deployment.yaml
  - service.yaml
  - migration-job.yaml
  - ingress.yaml
  - ingress-import.yaml
  - pod-disruption-budget.yaml
  - network-policy.yaml
labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/name: kira-backend
      app.kubernetes.io/part-of: kira
