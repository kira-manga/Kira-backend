name: Deploy server3

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: read
  packages: read

concurrency:
  group: kira-backend-server3-production
  cancel-in-progress: false

jobs:
  deploy:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Build exact-SHA image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          load: true
          push: false
          tags: kira-backend:${{ github.event.workflow_run.head_sha }}
          build-args: |
            VERSION=${{ github.event.workflow_run.head_sha }}
            VCS_REF=${{ github.event.workflow_run.head_sha }}
            BUILD_DATE=1970-01-01T00:00:00Z
            KIRA_PACKAGES_USER=${{ github.actor }}
          secrets: |
            github_token=${{ secrets.GITHUB_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Configure pinned SSH host
        env:
          DEPLOY_KEY: ${{ secrets.SERVER3_SSH_PRIVATE_KEY }}
          KNOWN_HOSTS: ${{ secrets.SERVER3_KNOWN_HOSTS }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/kira_server3
          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/kira_server3 ~/.ssh/known_hosts
      - name: Stream image and deploy
        env:
          DEPLOY_HOST: ${{ vars.SERVER3_HOST }}
          DEPLOY_PORT: ${{ vars.SERVER3_PORT }}
          DEPLOY_USER: ${{ vars.SERVER3_USER }}
          REVISION: ${{ github.event.workflow_run.head_sha }}
        run: |
          docker save "kira-backend:$REVISION" | gzip -9 | \
            ssh -i ~/.ssh/kira_server3 -p "${DEPLOY_PORT:-22}" \
              -o BatchMode=yes -o IdentitiesOnly=yes \
              "$DEPLOY_USER@$DEPLOY_HOST" "deploy backend $REVISION"
