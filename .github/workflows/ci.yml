name: CI

on:
  pull_request:
  push:
    branches: [main, production-hardening]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4
      - name: Full Gradle verification
        run: ./gradlew --no-daemon clean check
      - name: Upload test and coverage reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: verification-reports
          path: |
            build/reports/tests
            build/reports/jacoco
            build/reports/detekt

  supply-chain:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4
      - name: Generate SBOM
        run: ./gradlew --no-daemon cyclonedxBom
      - name: Fail-closed dependency vulnerability scan
        run: |
          mkdir -p build/reports
          osv_image=ghcr.io/google/osv-scanner@sha256:64e86bec6df2466feea5137fc7c78fb3b7c21ec077f014d7130f64810e50676b
          docker run --rm --volume "$GITHUB_WORKSPACE/gradle.lockfile:/src/gradle.lockfile:ro" \
            --volume "$GITHUB_WORKSPACE/build/reports:/reports" "$osv_image" scan source \
            --lockfile /src/gradle.lockfile --format json --output-file /reports/osv.json
      - name: Secret scan
        uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: supply-chain-reports
          path: |
            build/reports/cyclonedx.*
            build/reports/osv.json

  container:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Build exact-SHA production image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: false
          load: true
          tags: kira-backend:${{ github.sha }}
          build-args: |
            VERSION=1.0.0
            VCS_REF=${{ github.sha }}
            BUILD_DATE=1970-01-01T00:00:00Z
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Production-profile container smoke
        run: scripts/smoke/container-smoke.sh kira-backend:${{ github.sha }}
      - name: Validate deployment manifests
        run: |
          kubectl_image=registry.k8s.io/kubectl@sha256:59bafa07ff3a6d4b417e7633ddb9d79a9606ca98bf64bac080b3e65748669250
          docker run --rm --volume "$GITHUB_WORKSPACE/deploy/kubernetes:/work:ro" "$kubectl_image" \
            kustomize /work/base > /tmp/kira-rendered.yaml
          kubeconform_image=ghcr.io/yannh/kubeconform@sha256:faffaf43f95aa6425306e1ab8d6fcad72acb9049158f38e574c085ea1ec0f64e
          docker run --rm --volume /tmp/kira-rendered.yaml:/work/kira-rendered.yaml:ro "$kubeconform_image" \
            -strict -summary -kubernetes-version 1.34.1 /work/kira-rendered.yaml
